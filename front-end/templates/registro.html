{% extends "base.html" %}

{% block tittle %} Nombre restaurante - Registro{% endblock %}

{% block content %}

<p>Estas en /registro</p>

<section>

    <div>
        <h1>SECCION 24</h1>
    </div>

    <div>

        <header>
            <h2>PASILLO COLÓN</h2>
            <p>CREAR CUENTA</p>
        </header>

        <form action="#" method="POST">

            <div>
                <label for="nombre">NOMBRE COMPLETO</label>
                <br>
                <input 
                    type="text" 
                    id="nombre" 
                    name="nombre"
                    placeholder="Tu nombre"
                >
            </div>

            <br>

            <div>
                <label for="email">CORREO ELECTRÓNICO</label>
                <br>
                <input 
                    type="email" 
                    id="email" 
                    name="email"
                    placeholder="tu@email.com"
                >
            </div>

            <br>

            <div>
                <label for="password">CONTRASEÑA</label>
                <br>
                <input 
                    type="password" 
                    id="password" 
                    name="password"
                    placeholder="Mínimo 8 caracteres"
                >
            </div>

            <br><br>

            <button type="submit">
                CREAR CUENTA
            </button>

        </form>

        <br>

        <p>
            ¿Ya tienes cuenta?
            <a href="#">Inicia sesión</a>
        </p>

        <br>

        <a href="#">← VOLVER AL INICIO</a>

    </div>

</section>

{% endblock %}
